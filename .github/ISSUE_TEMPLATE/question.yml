# AnomaVision 🔍 MIT License - https://github.com/DeepKnowledge1/AnomaVision

name: ❓ Question
description: Ask an AnomaVision question
labels: [question]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for asking an AnomaVision ❓ Question!

  - type: checkboxes
    id: search
    attributes:
      label: Search before asking
      description: Please search existing resources to see if your question has already been answered
      options:
        - label: I have searched the [AnomaVision issues](https://github.com/DeepKnowledge1/AnomaVision/issues), [discussions](https://github.com/DeepKnowledge1/AnomaVision/discussions), and documentation and found no similar questions
          required: true

  - type: dropdown
    id: category
    attributes:
      label: Question Category
      description: What type of question is this?
      options:
        - Installation & Setup
        - Training & Model Configuration
        - Data Preparation & Preprocessing
        - Anomaly Detection Methods
        - Performance & Optimization
        - Export & Deployment
        - Integration & APIs
        - Troubleshooting & Errors
        - Best Practices & Recommendations
        - Other
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know about AnomaVision?
      placeholder: |
        **Your Question:**
        Be as specific as possible about what you're trying to achieve or understand.

        **Context:**
        - What are you working on?
        - What have you tried so far?
        - What results are you getting vs. what you expected?

        💡 Include screenshots, code snippets, error messages, or logs for faster help!
    validations:
      required: true

  # ==========================================
  # STRICT ENVIRONMENT TRACING
  # ==========================================
  - type: markdown
    attributes:
      value: |
        ### 🖥️ Environment Configuration
        If your question is related to Installation, Errors, or Performance, please specify your environment setup.

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Ubuntu / Debian / Linux
        - Windows (Native)
        - Windows (WSL2)
        - macOS (Apple Silicon)
        - macOS (Intel)
        - N/A (Not relevant to my question)
    validations:
      required: false

  - type: dropdown
    id: package-manager
    attributes:
      label: Package Manager Used
      description: How did you install AnomaVision?
      options:
        - uv (e.g., uv pip install)
        - pip (legacy)
        - poetry
        - Built from source
        - N/A
    validations:
      required: false

  - type: dropdown
    id: hardware
    attributes:
      label: Target Hardware / Extra Bracket
      description: Which ML hardware bracket did you target during installation?
      options:
        - CPU Only (anomavision[cpu])
        - CUDA 12.1 (anomavision[cu121])
        - CUDA 12.4 (anomavision[cu124])
        - CUDA 11.8 (anomavision[cu118])
        - Custom / Other
        - N/A
    validations:
      required: false

  - type: input
    id: dataset
    attributes:
      label: Dataset Size/Type
      description: Only fill this out if your question involves training or data processing.
      placeholder: "e.g., 50GB Custom Image Dataset, MVTec AD, etc."
    validations:
      required: false
  # ==========================================

  - type: textarea
    id: code-example
    attributes:
      label: Code Example
      description: Relevant code you're working with (if applicable)
      placeholder: |
        ```python
        # Your code here
        ```

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected vs Actual Behavior
      description: What did you expect vs what actually happened? (if applicable)
      placeholder: |
        **Expected:** What you thought would happen

        **Actual:** What actually happened

        **Error messages:** Any error messages or unexpected outputs

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other information that might help answer your question
      placeholder: |
        - Links to similar issues or discussions
        - Screenshots or visualizations
        - Relevant research papers or methods you're referencing
        - Any other details that might be helpful
