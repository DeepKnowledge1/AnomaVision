repos:
  # Black: auto-format Python code (fixes E501 line too long)
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        args: [--line-length=88]

  # isort: automatically sort and group imports (fixes E402)
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black]

  # flake8: linting for style & errors
  # E501 is ignored because Black handles line length
  # E203 conflicts with Black (whitespace before ':')
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [
          --max-line-length=88,
          --extend-ignore=E203,E501,W503
        ]
        additional_dependencies: [
          flake8-bugbear,
          flake8-comprehensions
        ]

  # Basic cleanup hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # Run pytest LAST so it doesn't run if formatting/linting fails
  - repo: local
    hooks:
      - id: pytest
        name: Run pytest
        entry: uv run pytest
        language: system
        pass_filenames: false

# CRITICAL: Stop on first failure (don't run pytest if flake8 fails)
fail_fast: true
