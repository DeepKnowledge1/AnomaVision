repos:
  # Black: auto-format Python code
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        args: [--line-length=88]

  # isort: automatically sort and group imports
  - repo: https://github.com/pycqa/isort
      rev: 5.13.2
      hooks:
        - id: isort
          args:
            - --profile=black
            - --line-length=88
            - --force-single-line-imports  # This might help too

  # flake8: ONLY block on critical errors (F811 redefinitions)
  # All other warnings are ignored to allow legacy code to pass
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args:
          - --max-line-length=88
          - --extend-ignore=E203,E501,W503,E402,F401,F403,F841,B006,B007,B008,B009,C416,E262
        additional_dependencies:
          - flake8-bugbear
          - flake8-comprehensions

  # Basic cleanup hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # Run pytest LAST
  - repo: local
    hooks:
      - id: pytest
        name: Run pytest
        entry: uv run pytest
        language: system
        pass_filenames: false

# Stop on first failure (don't run pytest if flake8 fails)
fail_fast: true
